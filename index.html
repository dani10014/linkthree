<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <title>Linkthree</title>
</head>
<body>
    <header>
        <div class="container py-5 px-5">
            <div class="cabecalho">
                <h1>Àrvore de links</h1>
            </div>
        </div>
    </header>
    <div class="hero-background">
        <div class="backdrop-fade-out"></div>
    </div>
        
    <main>
        <div class="container pb-5 px-4">
            <div class="foto-pessoa">
                <img src="./src/imagens/1767305646979~2.jpg">
                <h1>Dijalma Duarte Fleitas</h1>
                <h3>Desenvolvedor <span>Front-End.</span> Estudante Full Stack <span>Java</span></h3>
            </div>
            <div class="botoes-links">
                <button class="linkedin" data-caminho="linkedin">
                    <i class="fa-brands fa-linkedin"></i>  Linkedin
                </button>
                <button class="wattsap" data-caminho="WhatsApp">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </button>
                <button class="Github" data-caminho="github">
                    <i class="fa-brands fa-github"></i> GitHub
                </button>
            </div>
        </div>
        <footer class="text-light">
            <div class="container d-flex justify-content-between gap-5 px-4">
                <p class="mb-0">
                &copy Desenvolvido por Dijalma Duarte Fleitas
                <p class="mb-0">Github:<a href="//github.com/dani10014/linkthree.git" target="_blank">linkthree</a></p>
            </div>
        </footer>
    </main>
    <script type="module" src="./dist/js/main.js"></script>
